<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 130" width="100%" height="130">
  <style>
    .cat-group {
      animation: walk 12s linear infinite;
    }
    @keyframes walk {
      0%   { transform: translateX(-160px); }
      100% { transform: translateX(960px); }
    }

    /* Покачивание тела */
    .body {
      animation: body-bob 0.4s ease-in-out infinite alternate;
      transform-origin: 55px 72px;
    }
    @keyframes body-bob {
      0%   { transform: translateY(0px); }
      100% { transform: translateY(-3px); }
    }

    /* Лапки */
    .leg-fl {
      animation: leg-f 0.4s ease-in-out infinite alternate;
      transform-origin: 62px 84px;
    }
    .leg-fr {
      animation: leg-f 0.4s ease-in-out infinite alternate-reverse;
      transform-origin: 72px 84px;
    }
    .leg-bl {
      animation: leg-b 0.4s ease-in-out infinite alternate-reverse;
      transform-origin: 36px 84px;
    }
    .leg-br {
      animation: leg-b 0.4s ease-in-out infinite alternate;
      transform-origin: 46px 84px;
    }
    @keyframes leg-f {
      0%   { transform: rotate(-22deg); }
      100% { transform: rotate(22deg); }
    }
    @keyframes leg-b {
      0%   { transform: rotate(-18deg); }
      100% { transform: rotate(18deg); }
    }

    /* Хвост */
    .tail {
      animation: tail 1.2s ease-in-out infinite alternate;
      transform-origin: 18px 68px;
    }
    @keyframes tail {
      0%   { transform: rotate(-20deg); }
      100% { transform: rotate(25deg); }
    }

    /* Моргание */
    .eye-l, .eye-r {
      animation: blink 4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95%            { transform: scaleY(0.08); }
    }
    .eye-l { transform-origin: 76px 55px; }
    .eye-r { transform-origin: 88px 55px; }

    /* Тень */
    .shadow {
      animation: shadow-walk 12s linear infinite;
    }
    @keyframes shadow-walk {
      0%   { transform: translateX(-160px); }
      100% { transform: translateX(960px); }
    }
    .shadow-bob {
      animation: shadow-size 0.4s ease-in-out infinite alternate;
      transform-origin: 55px 100px;
    }
    @keyframes shadow-size {
      0%   { transform: scaleX(1); opacity: 0.18; }
      100% { transform: scaleX(0.88); opacity: 0.12; }
    }
  </style>

  <!-- Тень на полу -->
  <g class="shadow">
    <g class="shadow-bob">
      <ellipse cx="55" cy="101" rx="38" ry="6" fill="#cc88aa"/>
    </g>
  </g>

  <g class="cat-group">

    <!-- Хвост -->
    <g class="tail">
      <path d="M20 70 Q2 52 6 34 Q10 18 22 32 Q16 48 20 70Z"
            fill="#ff99cc" stroke="#ff77bb" stroke-width="1"/>
      <!-- Кончик хвоста -->
      <ellipse cx="13" cy="28" rx="6" ry="7" fill="white"/>
    </g>

    <!-- Задние лапки -->
    <g class="leg-bl">
      <rect x="33" y="83" width="7" height="18" rx="3.5" fill="#ff99cc"/>
      <ellipse cx="36.5" cy="101" rx="5.5" ry="3" fill="#ff77bb"/>
    </g>
    <g class="leg-br">
      <rect x="43" y="83" width="7" height="18" rx="3.5" fill="#ff99cc"/>
      <ellipse cx="46.5" cy="101" rx="5.5" ry="3" fill="#ff77bb"/>
    </g>

    <!-- Тело -->
    <g class="body">
      <!-- Основное тело -->
      <ellipse cx="55" cy="72" rx="32" ry="20" fill="#ffbbdd"/>
      <!-- Брюшко -->
      <ellipse cx="58" cy="76" rx="18" ry="13" fill="#ffe0ee"/>

      <!-- Передние лапки -->
      <g class="leg-fl">
        <rect x="59" y="83" width="7" height="18" rx="3.5" fill="#ff99cc"/>
        <ellipse cx="62.5" cy="101" rx="5.5" ry="3" fill="#ff77bb"/>
      </g>
      <g class="leg-fr">
        <rect x="69" y="83" width="7" height="18" rx="3.5" fill="#ff99cc"/>
        <ellipse cx="72.5" cy="101" rx="5.5" ry="3" fill="#ff77bb"/>
      </g>

      <!-- Голова -->
      <circle cx="82" cy="54" r="22" fill="#ffbbdd"/>

      <!-- Ушки -->
      <polygon points="66,34 60,50 73,50" fill="#ffbbdd"/>
      <polygon points="94,34 100,50 87,50" fill="#ffbbdd"/>
      <!-- Внутри ушек -->
      <polygon points="66,37 62,49 71,49" fill="#ff99cc"/>
      <polygon points="94,37 98,49 89,49" fill="#ff99cc"/>

      <!-- Полоски на голове -->
      <path d="M75 38 Q82 35 89 38" stroke="#ff88bb" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M73 43 Q82 40 91 43" stroke="#ff88bb" stroke-width="1.5" fill="none" stroke-linecap="round"/>

      <!-- Глаза -->
      <g class="eye-l">
        <ellipse cx="76" cy="55" rx="4.5" ry="5" fill="#111"/>
        <circle cx="77.5" cy="53.5" r="1.5" fill="white"/>
        <circle cx="74.5" cy="56.5" r="0.8" fill="white"/>
      </g>
      <g class="eye-r">
        <ellipse cx="88" cy="55" rx="4.5" ry="5" fill="#111"/>
        <circle cx="89.5" cy="53.5" r="1.5" fill="white"/>
        <circle cx="87.5" cy="56.5" r="0.8" fill="white"/>
      </g>

      <!-- Нос -->
      <polygon points="82,61 79.5,64 84.5,64" fill="#ff5599"/>
      <!-- Мордочка -->
      <path d="M79.5 64 Q82 68 84.5 64" stroke="#ff5599" stroke-width="1.2" fill="none"/>

      <!-- Усы левые -->
      <line x1="60" y1="62" x2="78" y2="63" stroke="#dda0bb" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="59" y1="66" x2="78" y2="65" stroke="#dda0bb" stroke-width="1.2" stroke-linecap="round"/>
      <!-- Усы правые -->
      <line x1="104" y1="62" x2="86" y2="63" stroke="#dda0bb" stroke-width="1.2" stroke-linecap="round"/>
      <line x1="105" y1="66" x2="86" y2="65" stroke="#dda0bb" stroke-width="1.2" stroke-linecap="round"/>

      <!-- Щёчки -->
      <ellipse cx="72" cy="63" rx="5" ry="3" fill="#ffaacc" opacity="0.5"/>
      <ellipse cx="92" cy="63" rx="5" ry="3" fill="#ffaacc" opacity="0.5"/>
    </g>

  </g>
</svg>
